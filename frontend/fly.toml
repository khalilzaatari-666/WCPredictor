app = "worldcup-web"
primary_region = "iad"

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://worldcup-api.fly.dev/api"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
